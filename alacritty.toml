[env]
TERM = "xterm-256color"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[window]
decorations = "none"
startup_mode = "Maximized"
opacity = 0.8

[font]
size = 11

[window.padding]
x = 20
y = 20

# Colors (Material Theme)

# Default colors
[colors.primary]
background = '#1e282d'
foreground = '#c4c7d1'

# Normal colors
[colors.normal]
black   = '#666666'
red     = '#eb606b'
green   = '#c3e88d'
yellow  = '#f7eb95'
blue    = '#80cbc4'
magenta = '#ff2f90'
cyan    = '#aeddff'
white   = '#ffffff'

# Bright colors
[colors.bright]
black   = '#ff262b'
red     = '#eb606b'
green   = '#c3e88d'
yellow  = '#f7eb95'
blue    = '#7dc6bf'
magenta = '#6c71c4'
cyan    = '#35434d'
white   = '#ffffff'
